services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: powercycle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-powercycle}
      POSTGRES_DB: powercycle
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powercycle"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - DATABASE_URL=postgres://powercycle:${POSTGRES_PASSWORD:-powercycle}@postgres:5432/powercycle
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - PORT=${PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
