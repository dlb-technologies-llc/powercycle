x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: powercycle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-powercycle}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-powercycle}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-powercycle} -d ${DB_NAME:-powercycle}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    logging: *default-logging

  app:
    build: .
    image: ghcr.io/dlb-technologies-llc/powercycle:${IMAGE_TAG:-latest}
    container_name: powercycle-app
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      - "${PORT:-3000}:80"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-powercycle}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-powercycle}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - API_PORT=3001
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    logging: *default-logging

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  web:
    external: true
